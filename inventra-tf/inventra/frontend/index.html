<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventra — Gestionnaire de stocks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-logo">📦</span>
        <span class="header-title">Inventra</span>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="products">Produits</button>
        <button class="nav-btn" data-view="alerts">
          Alertes <span class="badge" id="alert-badge" hidden>0</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="main">
    <!-- ── Dashboard ─────────────────────────────────────── -->
    <section id="view-dashboard" class="view active">
      <h1 class="view-title">Tableau de bord</h1>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card" id="stat-total">
          <div class="stat-value">—</div>
          <div class="stat-label">Produits</div>
        </div>
        <div class="stat-card warning" id="stat-low">
          <div class="stat-value">—</div>
          <div class="stat-label">Stock bas</div>
        </div>
        <div class="stat-card danger" id="stat-out">
          <div class="stat-value">—</div>
          <div class="stat-label">Ruptures</div>
        </div>
        <div class="stat-card info" id="stat-value">
          <div class="stat-value">—</div>
          <div class="stat-label">Valeur totale (€)</div>
        </div>
      </div>
      <h2 class="section-title">Produits en alerte</h2>
      <table class="table" id="dashboard-table">
        <thead><tr>
          <th>Produit</th><th>Catégorie</th>
          <th>Qté</th><th>Seuil</th><th>État</th>
        </tr></thead>
        <tbody id="dashboard-tbody"></tbody>
      </table>
    </section>

    <!-- ── Produits ───────────────────────────────────────── -->
    <section id="view-products" class="view">
      <div class="view-header">
        <h1 class="view-title">Produits</h1>
        <button class="btn btn-primary" id="btn-new-product">+ Nouveau produit</button>
      </div>
      <div class="filters">
        <input id="filter-search" type="text" placeholder="Rechercher…" />
        <select id="filter-category"><option value="">Toutes les catégories</option></select>
        <label class="filter-check">
          <input type="checkbox" id="filter-low-stock" /> Stock bas uniquement
        </label>
      </div>
      <table class="table" id="products-table">
        <thead><tr>
          <th>SKU</th><th>Nom</th><th>Catégorie</th>
          <th>Qté</th><th>Unité</th><th>Prix unit.</th><th>Seuil</th>
          <th>État</th><th>Actions</th>
        </tr></thead>
        <tbody id="products-tbody"></tbody>
      </table>
    </section>

    <!-- ── Alertes ────────────────────────────────────────── -->
    <section id="view-alerts" class="view">
      <h1 class="view-title">Alertes actives</h1>
      <div id="alerts-list"></div>
    </section>
  </main>

  <!-- ── Modal produit ──────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nouveau produit</h2>
        <button class="modal-close" id="btn-modal-close">✕</button>
      </div>
      <form id="product-form" class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Nom <span class="required">*</span></label>
            <input type="text" name="name" required />
          </div>
          <div class="form-group">
            <label>SKU</label>
            <input type="text" name="sku" placeholder="ex. PROD-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Catégorie</label>
            <input type="text" name="category" value="Général" />
          </div>
          <div class="form-group">
            <label>Unité</label>
            <input type="text" name="unit" value="unité" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantité initiale</label>
            <input type="number" name="quantity" value="0" min="0" />
          </div>
          <div class="form-group">
            <label>Seuil d'alerte</label>
            <input type="number" name="alert_threshold" value="10" min="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Prix unitaire (€)</label>
            <input type="number" name="price" value="0" min="0" step="0.01" />
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="2"></textarea>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn" id="btn-cancel">Annuler</button>
        <button class="btn btn-primary" id="btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Modal mouvement de stock ──────────────────────── -->
  <div class="modal-overlay" id="move-overlay" hidden>
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="move-title">Mouvement de stock</h2>
        <button class="modal-close" id="btn-move-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Type</label>
          <select id="move-type">
            <option value="in">Entrée (+)</option>
            <option value="out">Sortie (−)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quantité</label>
          <input type="number" id="move-qty" value="1" min="1" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-move-cancel">Annuler</button>
        <button class="btn btn-primary" id="btn-move-confirm">Valider</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="app.js"></script>
</body>
</html>
